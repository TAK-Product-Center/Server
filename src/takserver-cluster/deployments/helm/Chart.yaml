apiVersion: v2
name: takserver
description: TAK Server
version: "4.5.0"
type: application

dependencies:
  - name: postgresql
    version: "12.1.6"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
    tags:
      - takserver-backend
      - postgresql
  - name: ignite
    version: "2.17.0"
    repository: "file://./third-party/ignite"
    tags:
      - takserver-backend
      - ignite
  - name: nats
    version: "1.0.1"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    tags:
      - takserver-backend
      - nats
